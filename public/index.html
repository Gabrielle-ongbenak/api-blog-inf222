 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GabyTech | Digital Garden Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. CSS : LE DESIGN SYSTÈME (BENTO & MODERNE) --- */
        :root {
            --coral: #f08080; /* Ta couleur LightCoral */
            --bg: #fdfdfd;
            --text: #1a1c20;
            --sub: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Barre Latérale Épurée */
        aside {
            width: 280px; padding: 40px; background: white;
            border-right: 1px solid #f3f3f3; display: flex; flex-direction: column;
        }
        .logo { font-size: 1.9rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 60px; }
        .logo span { color: var(--coral); }
        
        nav a { 
            text-decoration: none; color: var(--sub); font-weight: 600; 
            padding: 18px 0; display: block; transition: 0.3s; font-size: 0.95rem;
        }
        nav a:hover, nav a.active { color: var(--coral); transform: translateX(8px); }

        /* Contenu Principal */
        main { flex: 1; padding: 60px 8%; overflow-y: auto; position: relative; }
        
        .header-box { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; }
        .header-box h1 { font-size: 3.2rem; letter-spacing: -2.5px; line-height: 1; }
        .header-box h1 span { color: var(--coral); }
        .header-box p { color: var(--sub); margin-top: 10px; }

        .btn-main {
            background: var(--coral); color: white; border: none;
            padding: 16px 32px; border-radius: 20px; font-weight: 700;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 15px 35px rgba(240,128,128,0.35); }

        /* Grille Bento */
        .bento-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 230px; gap: 28px; padding-bottom: 100px;
        }

        /* Cartes Bento de Base */
        .bento-card {
            background: white; border-radius: 35px; padding: 35px;
            border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 30px rgba(0,0,0,0.01);
            display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0; transform: translateY(30px);
        }
        .bento-card:hover { transform: translateY(-12px); border-color: var(--coral); box-shadow: 0 25px 50px rgba(0,0,0,0.04); }

        /* Tailles Bento Spéciales */
        .large { grid-column: span 2; grid-row: span 2; }
        .tall { grid-row: span 2; background: var(--coral); color: white; border: none; }

        .tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--coral); margin-bottom: 15px; display: block; }
        .tall .tag { color: white; opacity: 0.8; }
        
        h2 { font-size: 1.9rem; letter-spacing: -1px; margin-bottom: 12px; line-height: 1.2; }
        p { color: #64748b; font-size: 1rem; line-height: 1.7; }
        .tall p { color: white; opacity: 0.9; }

        .card-footer { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; margin-top: auto; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .tall .card-footer { border-top-color: rgba(255,255,255,0.2); }
        /* --- 2. CSS : LE FORMULAIRE CRÉATIF (MODAL SLIDE-IN) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px);
            z-index: 1000; display: none; justify-content: center; align-items: flex-end; /* Glisse depuis le bas */
            transition: 0.4s;
        }

        .modal-content {
            background: white; width: 650px; height: 85vh; /* Très grand, style application */
            border-radius: 40px 40px 0 0; padding: 50px;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow-y: auto; position: relative;
        }

        /* Quand ouvert */
        .modal-overlay.open { display: flex; }
        .modal-overlay.open .modal-content { transform: translateY(0); }

        .close-modal {
            position: absolute; top: 30px; right: 30px;
            font-size: 2rem; color: var(--sub); cursor: pointer; border: none; background: none;
        }
        .close-modal:hover { color: var(--coral); }

        .modal-content h3 { font-size: 2.2rem; letter-spacing: -1.5px; margin-bottom: 40px; }
        .modal-content h3 span { color: var(--coral); }

        /* Champs du formulaire stylisés */
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-weight: 700; font-size: 0.9rem; color: #475569; margin-bottom: 10px; }
        
        .input-style, .textarea-style, .select-style {
            width: 100%; padding: 18px; border-radius: 16px;
            border: 2px solid #e2e8f0; font-family: inherit; font-size: 1rem;
            transition: 0.3s; background: #f8fafc;
        }
        .input-style:focus, .textarea-style:focus, .select-style:focus {
            border-color: var(--coral); background: white; outline: none; box-shadow: 0 0 0 4px rgba(240, 128, 128, 0.1);
        }

        .textarea-style { resize: none; height: 180px; }
        
        /* Select personnalisé Corail */
        .select-style { appearance: none; color: var(--coral); font-weight: 600; cursor: pointer; }

        /* Boutons d'action du formulaire */
        .form-actions { display: flex; gap: 15px; margin-top: 40px; justify-content: flex-end; }
        
        .btn-secondary { background: #e2e8f0; color: #475569; border: none; padding: 16px 28px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-secondary:hover { background: #cbd5e1; }

        /* Animations */
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside>
        <div class="logo">Gaby<span>Tech.</span></div>
        <nav>
            <a href="#" class="active">Vue d'ensemble</a>
            <a href="/api-docs">Documentation API</a>
            <a href="#">Archives Projets</a>
            <a href="#">Statistiques</a>
        </nav>
        <div style="margin-top: auto; font-size: 0.75rem; color: var(--sub);">© 2026 GABRIELLE • INF222</div>
    </aside>

    <main>
        <div class="header-box">
            <div>
                <h1>BLOG <span>API</span></h1>
                <p>Bienvenue Gabrielle. Gère tes publications dans t'es API.</p>
            </div>
            <button class="btn-main" onclick="openModal()">+ Publier un article</button>
        </div>
        <section id="grid" class="bento-grid">
            </section>
    </main>

    <div id="createModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            
            <h3>Publier une nouvelle <span>idée</span></h3>
            <form id="articleForm">
                <div class="form-group">
                    <label for="titre">Titre de l'article</label>
                    <input type="text" id="titre" name="titre" class="input-style" placeholder="Un titre accrocheur..." required>
                </div>

                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="auteur">Auteur</label>
                        <input type="text" id="auteur" name="auteur" class="input-style" value="Gabrielle" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="categorie">Catégorie</label>
                        <select id="categorie" name="categorie" class="select-style" required>
                            <option value="" disabled selected>Choisir...</option>
                            <option value="TECH">💻 Technologie</option>
                            <option value="DESIGN">🎨 Design UI/UX</option>
                            <option value="ACTU">🌐 Actualités Numériques</option>
                            <option value="CODE">🛠️ Développement Web</option>
                            <option value="INNOV">🚀 Innovation</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tags">Tags (séparés par des virgules)</label>
                    <input type="text" id="tags" name="tags" class="input-style" placeholder="ex: sqlite, nodejs, creative">
                </div>

                <div class="form-group">
                    <label for="contenu">Contenu</label>
                    <textarea id="contenu" name="contenu" class="textarea-style" placeholder="Développez votre pensée ici..." required></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-main">Enregistrer la publication</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /* --- 3. JAVASCRIPT : LOGIQUE & API --- */

        // 1. Charger et Afficher les articles (Bento Style)
        async function fetchArticles() {
            const grid = document.getElementById('grid');
            try {
                const response = await fetch('/api/articles'); // Appelle ton SQLite
                const articles = await response.json();
                
                if(articles.length === 0) {
                    grid.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Le jardin est vide... Ajoutez une première idée !</p>";
                    return;
                }
                
                // Rendu dynamique Bento Asymétrique
                grid.innerHTML = articles.map((art, index) => {
                    let layoutClass = "small";
                    if (index === 0) layoutClass = "large"; // Premier grand
                    if (index === 1) layoutClass = "tall";  // Deuxième vertical Corail

                    return `
                        <div class="bento-card ${layoutClass}" style="animation: fadeInUp 0.5s forwards ${index * 0.1}s">
                            <div>
                                <span class="tag">${art.categorie || 'Innovation'}</span>
                                <h2>${art.titre}</h2>
                                <p>${art.contenu.substring(0, index === 0 ? 200 : 100)}...</p>
                            </div>
                            <div class="card-footer">
                                <span>✍️ ${art.auteur}</span>
                                <span style="color: #94a3b8;">${art.date || 'Mars 2026'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                grid.innerHTML = "<p>Erreur API : Vérifiez que le serveur Node (src/index.js) tourne sur le port 8080.</p>";
            }
        }

        /* --- LOGIQUE DU FORMULAIRE MODAL --- */
        const modal = document.getElementById('createModal');
        const form = document.getElementById('articleForm');

        function openModal() {
            modal.classList.add('open');
            document.body.style.overflow = 'hidden'; // Empêche le scroll derrière
        }

        function closeModal() {
            modal.classList.remove('open');
            document.body.style.overflow = 'auto';
            form.reset(); // Vide le formulaire
        }

        function closeModalOnOverlay(e) {
            if (e.target === modal) closeModal(); // Ferme si on clique à côté
        }

        // 2. Envoyer le formulaire vers l'API SQLite
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Empêche de recharger la page
            
            // On récupère les données du formulaire
            const formData = new FormData(form);
            const data = {
                titre: formData.get('titre'),
                contenu: formData.get('contenu'),
                auteur: formData.get('auteur'),
                date: new Date().toLocaleDateString('fr-FR'), // Date automatique du jour
                categorie: formData.get('categorie'),
                tags: formData.get('tags')
            };

            try {
                // Envoi vers POST /api/articles
                const response = await fetch('/api/articles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeModal(); // Ferme le formulaire
                    fetchArticles(); // Recharge la grille
                } else {
                    alert("Erreur lors de la création de l'article.");
                }
            } catch (error) {
                alert("Impossible de contacter l'API.");
            }
        });

        // Lancer au démarrage
        window.onload = fetchArticles;
    </script>
</body>
</html>
